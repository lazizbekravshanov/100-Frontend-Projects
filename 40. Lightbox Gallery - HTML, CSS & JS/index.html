<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lightbox Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  <script src="./script.js" defer></script>
</head>
<body>
  <main class="page">
    <header class="page__head">
      <p class="eyebrow">Gallery</p>
      <h1 class="page__title">Lightbox Gallery</h1>
      <p class="page__lead">
        Click any tile to open it full-screen. Move between items with the arrows or your
        keyboard, and close with <kbd>Esc</kbd> or a click on the backdrop.
      </p>
    </header>

    <ul class="grid" id="grid"></ul>
  </main>

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer" hidden>
    <button class="lightbox__close" id="close" type="button" aria-label="Close viewer">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <path d="M6 6l12 12M18 6L6 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>

    <button class="lightbox__nav lightbox__nav--prev" id="lbPrev" type="button" aria-label="Previous image">
      <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true">
        <path d="M15 6l-6 6 6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <figure class="lightbox__figure">
      <div class="lightbox__stage" id="stage"></div>
      <figcaption class="lightbox__caption">
        <span id="caption"></span>
        <span class="lightbox__counter" id="counter"></span>
      </figcaption>
    </figure>

    <button class="lightbox__nav lightbox__nav--next" id="lbNext" type="button" aria-label="Next image">
      <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true">
        <path d="M9 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</body>
</html>
