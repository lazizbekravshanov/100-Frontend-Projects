<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Card Game</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="./script.js" defer></script>
</head>
<body>
  <div class="app">
    <header class="app__header">
      <h1 class="app__title">Memory Match</h1>
      <p class="app__subtitle">Flip two cards at a time and find every matching pair.</p>
    </header>

    <main class="app__main">
      <section class="hud" aria-label="Game status">
        <div class="hud__stat">
          <span class="hud__value" id="moves">0</span>
          <span class="hud__label">Moves</span>
        </div>
        <div class="hud__stat">
          <span class="hud__value" id="matches">0</span>
          <span class="hud__label">Pairs</span>
        </div>
        <div class="hud__stat">
          <span class="hud__value" id="time">0:00</span>
          <span class="hud__label">Time</span>
        </div>
        <button class="btn btn--accent" id="restart" type="button">Shuffle &amp; Restart</button>
      </section>

      <section class="board" id="board" aria-label="Card grid"></section>

      <p class="win" id="win" role="status" aria-live="polite" hidden></p>
    </main>

    <footer class="app__footer">
      <p>Eight pairs. Fewer moves means a better score.</p>
    </footer>
  </div>
</body>
</html>
