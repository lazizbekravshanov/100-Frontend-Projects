<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Price Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  <script src="./script.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <div class="brand">
        <span class="brand__dot" aria-hidden="true"></span>
        <h1 class="brand__name">Crypto Tracker</h1>
      </div>
      <p class="brand__tag">Live top coins by market cap</p>
    </div>
  </header>

  <main class="wrap">
    <section class="controls" aria-label="Controls">
      <div class="search">
        <label for="search" class="visually-hidden">Search coins</label>
        <svg class="search__icon" viewBox="0 0 24 24" aria-hidden="true" width="18" height="18">
          <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/>
          <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input type="search" id="search" placeholder="Search name or symbol…" autocomplete="off">
      </div>
      <button type="button" id="refresh" class="btn">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
          <path d="M4 12a8 8 0 0 1 13.7-5.6M20 12a8 8 0 0 1-13.7 5.6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M17.5 3v3.5H14M6.5 21v-3.5H10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Refresh</span>
      </button>
    </section>

    <p class="status" id="status" role="status" aria-live="polite"></p>

    <section aria-label="Coin list">
      <ul class="coin-list" id="coin-list"></ul>
    </section>
  </main>

  <footer class="site-footer">
    <p class="wrap">Data from CoinGecko public API. Prices in USD.</p>
  </footer>
</body>
</html>
