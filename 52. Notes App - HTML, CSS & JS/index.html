<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  <script src="./script.js" defer></script>
</head>
<body>
  <div class="layout">
    <header class="topbar">
      <div class="topbar__brand">
        <h1 class="topbar__title">Notes</h1>
        <span class="topbar__count" id="note-count">0 notes</span>
      </div>
      <div class="topbar__actions">
        <label class="sr-only" for="search">Search notes</label>
        <input class="search" id="search" type="search" placeholder="Search notes…" autocomplete="off">
        <button class="btn btn--primary" type="button" id="new-note">New note</button>
      </div>
    </header>

    <main class="board">
      <section class="notes-grid" id="notes-grid" aria-label="Notes"></section>

      <p class="empty-state" id="empty-state" hidden>
        <span class="empty-state__mark" aria-hidden="true">🗒️</span>
        <span id="empty-text">No notes yet. Create your first note.</span>
      </p>
    </main>
  </div>

  <div class="modal" id="modal" hidden>
    <div class="modal__backdrop" data-close></div>
    <div class="modal__panel" role="dialog" aria-modal="true" aria-labelledby="editor-title">
      <form class="editor" id="editor">
        <h2 class="sr-only" id="editor-title">Note editor</h2>
        <label class="sr-only" for="note-title">Title</label>
        <input class="editor__title" id="note-title" type="text" placeholder="Title" maxlength="80" autocomplete="off">
        <label class="sr-only" for="note-body">Note</label>
        <textarea class="editor__body" id="note-body" placeholder="Write something…" rows="10"></textarea>
        <div class="editor__footer">
          <span class="editor__meta" id="editor-meta"></span>
          <div class="editor__buttons">
            <button class="btn" type="button" data-close>Cancel</button>
            <button class="btn btn--primary" type="submit">Save note</button>
          </div>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
