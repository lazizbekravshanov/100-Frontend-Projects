<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joke Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  <script src="./script.js" defer></script>
</head>
<body>
  <main class="stage">
    <header class="head">
      <p class="eyebrow">A little something to make you smile</p>
      <h1 class="head__title">The Joke Generator</h1>
    </header>

    <section class="card" aria-live="polite">
      <p class="card__setup" id="setup">Loading a joke…</p>
      <button type="button" class="reveal" id="reveal" hidden>
        Tap to reveal the punchline
      </button>
      <p class="card__punchline" id="punchline" hidden></p>
      <p class="card__error" id="error" hidden></p>
    </section>

    <div class="actions">
      <button type="button" class="btn btn--primary" id="next">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
          <path d="M4 12a8 8 0 0 1 13.7-5.6M20 12a8 8 0 0 1-13.7 5.6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M17.5 3v3.5H14M6.5 21v-3.5H10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Another joke</span>
      </button>
    </div>
  </main>

  <footer class="foot">
    <p>Jokes from official-joke-api</p>
  </footer>
</body>
</html>
