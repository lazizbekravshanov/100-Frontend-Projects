<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="./style.css">
  <script src="./script.js" defer></script>
</head>
<body>
  <div class="app">
    <header class="app__header">
      <h1 class="app__title">Weather</h1>
      <p class="app__subtitle">Live conditions and a 5-day outlook for any city.</p>
      <form class="search" id="search-form" role="search">
        <label class="search__label" for="city-input">Search city</label>
        <div class="search__row">
          <input
            class="search__input"
            id="city-input"
            type="text"
            name="city"
            placeholder="Try “Tokyo”, “Nairobi”, “Lima”…"
            autocomplete="off"
            spellcheck="false">
          <button class="search__btn" type="submit" aria-label="Search weather">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <span>Search</span>
          </button>
        </div>
      </form>
    </header>

    <main class="app__main" id="main">
      <p class="status" id="status" role="status" aria-live="polite">Loading weather…</p>

      <section class="current" id="current" hidden aria-label="Current conditions">
        <div class="current__head">
          <div>
            <h2 class="current__place" id="place">—</h2>
            <p class="current__desc" id="desc">—</p>
          </div>
          <div class="current__icon" id="icon" aria-hidden="true">·</div>
        </div>
        <p class="current__temp"><span id="temp">—</span><span class="current__unit">°C</span></p>
        <ul class="stats" id="stats">
          <li class="stat">
            <span class="stat__label">Feels like</span>
            <span class="stat__value" id="feels">—</span>
          </li>
          <li class="stat">
            <span class="stat__label">Wind</span>
            <span class="stat__value" id="wind">—</span>
          </li>
          <li class="stat">
            <span class="stat__label">Humidity</span>
            <span class="stat__value" id="humidity">—</span>
          </li>
          <li class="stat">
            <span class="stat__label">Precip.</span>
            <span class="stat__value" id="precip">—</span>
          </li>
        </ul>
      </section>

      <section class="forecast" id="forecast" hidden aria-label="Daily forecast">
        <h3 class="forecast__title">5-day forecast</h3>
        <ul class="forecast__list" id="forecast-list"></ul>
      </section>
    </main>

    <footer class="app__footer">
      <p>Data from <a href="https://open-meteo.com" target="_blank" rel="noopener">Open-Meteo</a> · no API key</p>
    </footer>
  </div>
</body>
</html>
