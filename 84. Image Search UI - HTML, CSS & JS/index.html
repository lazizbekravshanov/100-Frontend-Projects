<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Search UI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  <script src="./script.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <h1 class="title">Image Gallery</h1>
      <p class="subtitle">Curated collections, powered by Lorem Picsum.</p>
    </div>
  </header>

  <main class="wrap">
    <section class="controls" aria-label="Browse">
      <div class="search">
        <label for="search" class="visually-hidden">Search a keyword</label>
        <svg class="search__icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/>
          <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input type="search" id="search" placeholder="Try a keyword, e.g. sunset…" autocomplete="off">
      </div>
      <button type="button" class="btn" id="go">Search</button>
    </section>

    <nav class="categories" id="categories" aria-label="Categories"></nav>

    <p class="status" id="status" role="status" aria-live="polite"></p>

    <section aria-label="Image results">
      <div class="masonry" id="gallery"></div>
    </section>
  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" hidden>
    <button type="button" class="lightbox__close" data-close aria-label="Close image">&times;</button>
    <button type="button" class="lightbox__nav lightbox__nav--prev" id="prev" aria-label="Previous image">&#8249;</button>
    <figure class="lightbox__fig">
      <img id="lightbox-img" alt="">
      <figcaption id="lightbox-cap"></figcaption>
    </figure>
    <button type="button" class="lightbox__nav lightbox__nav--next" id="next" aria-label="Next image">&#8250;</button>
    <div class="lightbox__backdrop" data-close></div>
  </div>

  <footer class="site-footer">
    <p class="wrap">Images from Lorem Picsum. Keywords map to seeded, deterministic photos.</p>
  </footer>
</body>
</html>
