<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Palette Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  <script src="./script.js" defer></script>
</head>
<body>
  <div class="app">
    <header class="app__header">
      <div>
        <h1 class="app__title">Palette Generator</h1>
        <p class="app__subtitle">Press <kbd>Space</kbd> to regenerate. Click a swatch to copy its hex. Lock the ones you love.</p>
      </div>
      <button type="button" class="btn btn--primary" id="generateBtn">Generate</button>
    </header>

    <main class="palette" id="palette" aria-label="Color palette"></main>

    <p class="toast" id="toast" role="status" aria-live="polite"></p>
  </div>
</body>
</html>
