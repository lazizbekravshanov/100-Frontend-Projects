<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="orbit-bg" aria-hidden="true"></div>

  <main class="stage">
    <div class="illustration" aria-hidden="true">
      <svg viewBox="0 0 240 160" role="presentation">
        <circle class="planet" cx="120" cy="80" r="42" />
        <ellipse class="ring" cx="120" cy="80" rx="72" ry="24" />
        <circle class="moon" cx="188" cy="52" r="9" />
        <circle class="crater" cx="108" cy="70" r="6" />
        <circle class="crater" cx="132" cy="92" r="4" />
        <circle class="crater" cx="126" cy="64" r="3" />
      </svg>
    </div>

    <p class="code" aria-hidden="true">404</p>
    <h1 class="title">This page drifted off course</h1>
    <p class="message">
      The page you were looking for doesn’t exist, may have moved, or is
      still out exploring somewhere. Let’s get you back to familiar ground.
    </p>

    <div class="actions">
      <a class="btn btn-primary" href="./index.html">Back to home</a>
      <a class="btn btn-ghost" href="./index.html">Contact support</a>
    </div>

    <p class="hint">Error code: <span>HTTP 404 — Not Found</span></p>
  </main>

  <footer class="page-footer">
    <p>&copy; 2026 Northbound Studio</p>
  </footer>
</body>
</html>
