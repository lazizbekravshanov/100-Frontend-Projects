<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Country Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  <script src="./script.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <h1 class="title">Country Explorer</h1>
      <p class="subtitle">Search and browse every country on Earth.</p>
    </div>
  </header>

  <main class="wrap">
    <section class="controls" aria-label="Filters">
      <div class="search">
        <label for="search" class="visually-hidden">Search countries</label>
        <svg class="search__icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/>
          <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input type="search" id="search" placeholder="Search for a country…" autocomplete="off">
      </div>
      <div class="select">
        <label for="region" class="visually-hidden">Filter by region</label>
        <select id="region">
          <option value="">All regions</option>
          <option value="Africa">Africa</option>
          <option value="Americas">Americas</option>
          <option value="Asia">Asia</option>
          <option value="Europe">Europe</option>
          <option value="Oceania">Oceania</option>
          <option value="Antarctic">Antarctic</option>
        </select>
      </div>
    </section>

    <p class="status" id="status" role="status" aria-live="polite"></p>

    <section aria-label="Country list">
      <ul class="grid" id="grid"></ul>
    </section>
  </main>

  <!-- Detail dialog -->
  <div class="modal" id="modal" hidden>
    <div class="modal__backdrop" data-close></div>
    <div class="modal__panel" role="dialog" aria-modal="true" aria-labelledby="modal-name">
      <button type="button" class="modal__close" data-close aria-label="Close details">&times;</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <footer class="site-footer">
    <p class="wrap">Data from restcountries.com</p>
  </footer>
</body>
</html>
