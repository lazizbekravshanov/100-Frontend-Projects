<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="./style.css">
  <script src="./script.js" defer></script>
</head>
<body>
  <div class="page">
    <header class="page__header">
      <h1 class="page__title">Movie Search</h1>
      <p class="page__subtitle">Browse the collection, search by title, and filter by genre.</p>

      <div class="controls">
        <div class="field field--search">
          <label class="field__label" for="search">Search titles</label>
          <input
            class="field__input"
            id="search"
            type="search"
            placeholder="Search by title or synopsis…"
            autocomplete="off">
        </div>
        <div class="field">
          <label class="field__label" for="genre">Genre</label>
          <select class="field__select" id="genre" aria-label="Filter by genre"></select>
        </div>
      </div>
    </header>

    <main class="page__main">
      <p class="results-count" id="results-count" aria-live="polite"></p>
      <ul class="grid" id="grid"></ul>
      <p class="empty" id="empty" hidden>No movies match your search.</p>
    </main>

    <footer class="page__footer">
      <p>UI demo · movie data is a local mock dataset (no external API)</p>
    </footer>
  </div>

  <div class="modal" id="modal" hidden>
    <div class="modal__backdrop" data-close></div>
    <div class="modal__dialog" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal__close" id="modal-close" type="button" aria-label="Close details">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
      <div class="modal__poster" id="modal-poster" aria-hidden="true"></div>
      <div class="modal__body">
        <h2 class="modal__title" id="modal-title">—</h2>
        <p class="modal__meta" id="modal-meta">—</p>
        <p class="modal__synopsis" id="modal-synopsis">—</p>
      </div>
    </div>
  </div>
</body>
</html>
